- name: Create user
  become: yes
  ansible.builtin.user:
    name: "{{ user_name }}"
    password: "{{ user_password | password_hash('sha512') }}"
    shell: /bin/bash
    create_home: yes
    state: present
  register: user_environment_user

- name: Add git config for created user
  become: yes
  ansible.builtin.template:
    src: gitconfig.j2
    dest: "/home/{{ user_name }}/.gitconfig"
    owner: "{{ user_name }}"
    group: "{{ user_name }}"
    mode: '0644'
  when: user_environment_user.changed
